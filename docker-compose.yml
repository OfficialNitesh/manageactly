services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: manageactly
      POSTGRES_PASSWORD: manageactly
      POSTGRES_DB: manageactly
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8080:8080"

volumes:
  db_data:
